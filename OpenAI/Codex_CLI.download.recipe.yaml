Description: |
  Downloads the latest Codex CLI (Apple Silicon and Intel) from the openai/codex
  GitHub releases and verifies each binary's code signature.

  Codex publishes per-architecture tarballs (codex-aarch64-apple-darwin.tar.gz and
  codex-x86_64-apple-darwin.tar.gz). Both are downloaded and extracted so the pkg
  recipe can build a universal installer. The clean version is derived in the pkg
  recipe from the binary itself, because the GitHub release tag is prefixed
  (e.g. rust-vX.Y.Z).

  Run as part of the full download -> pkg -> upload chain. URLDownloaderPython caches
  by ETag/Last-Modified and the StopProcessingIf download_changed predicate
  short-circuits the chain on no-op re-runs.
Identifier: com.github.smithjw.download.Codex_CLI
MinimumVersion: '2.9'

Input:
  NAME: Codex CLI
  SOFTWARE_TITLE: Codex_CLI
  INCLUDE_PRERELEASES: null
  DOWNLOAD_MISSING_FILE: null
  BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED: 'False'

Process:
  - Processor: GitHubReleasesInfoProvider
    Arguments:
      asset_regex: '^codex-aarch64-apple-darwin\.tar\.gz$'
      github_repo: openai/codex
      include_prereleases: '%INCLUDE_PRERELEASES%'

  - Processor: URLDownloaderPython
    Arguments:
      download_missing_file: '%DOWNLOAD_MISSING_FILE%'
      filename: '%SOFTWARE_TITLE%-arm64.tar.gz'

  - Processor: GitHubReleasesInfoProvider
    Arguments:
      asset_regex: '^codex-x86_64-apple-darwin\.tar\.gz$'
      github_repo: openai/codex
      include_prereleases: '%INCLUDE_PRERELEASES%'

  - Processor: URLDownloaderPython
    Arguments:
      download_missing_file: '%DOWNLOAD_MISSING_FILE%'
      filename: '%SOFTWARE_TITLE%-x86_64.tar.gz'

  - Processor: EndOfCheckPhase

  - Processor: StopProcessingIf
    Arguments:
      predicate: 'download_changed == False AND %BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED% == False'

  - Processor: Unarchiver
    Arguments:
      archive_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-arm64.tar.gz'
      destination_path: '%RECIPE_CACHE_DIR%/%SOFTWARE_TITLE%-arm64'
      purge_destination: true

  - Processor: Unarchiver
    Arguments:
      archive_path: '%RECIPE_CACHE_DIR%/downloads/%SOFTWARE_TITLE%-x86_64.tar.gz'
      destination_path: '%RECIPE_CACHE_DIR%/%SOFTWARE_TITLE%-x86_64'
      purge_destination: true

  - Processor: CodeSignatureVerifier
    Arguments:
      deep_verification: true
      input_path: '%RECIPE_CACHE_DIR%/%SOFTWARE_TITLE%-arm64/codex-aarch64-apple-darwin'
      requirement: identifier "codex" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "2DC432GLL2"
      strict_verification: true

  - Processor: CodeSignatureVerifier
    Arguments:
      deep_verification: true
      input_path: '%RECIPE_CACHE_DIR%/%SOFTWARE_TITLE%-x86_64/codex-x86_64-apple-darwin'
      requirement: identifier "codex" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "2DC432GLL2"
      strict_verification: true

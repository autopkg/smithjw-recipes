Description: |
  Downloads the latest version of cmux from the project's GitHub releases.

  Run as part of the full download -> pkg -> upload chain. URLDownloaderPython caches
  by ETag/Last-Modified and the StopProcessingIf download_changed predicate
  short-circuits the chain on no-op re-runs. The release asset (cmux-macos.dmg) has a
  fixed name, so the app version is read from the mounted app rather than the filename.
Identifier: com.github.smithjw.download.cmux
MinimumVersion: '2.9'

Input:
  NAME: cmux
  SOFTWARE_TITLE: cmux
  INCLUDE_PRERELEASES: null
  DOWNLOAD_MISSING_FILE: null
  BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED: 'False'

Process:
  - Processor: GitHubReleasesInfoProvider
    Arguments:
      asset_regex: '^cmux-macos\.dmg$'
      github_repo: manaflow-ai/cmux
      include_prereleases: '%INCLUDE_PRERELEASES%'

  - Processor: URLDownloaderPython
    Arguments:
      download_missing_file: '%DOWNLOAD_MISSING_FILE%'

  - Processor: EndOfCheckPhase

  - Processor: StopProcessingIf
    Arguments:
      predicate: 'download_changed == False AND %BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED% == False'

  - Processor: AppDmgVersioner
    Arguments:
      dmg_path: '%pathname%'

  - Processor: CodeSignatureVerifier
    Arguments:
      deep_verification: true
      strict_verification: true
      input_path: '%pathname%/cmux.app'
      requirement: identifier "com.cmuxterm.app" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "7WLXT3NR37"

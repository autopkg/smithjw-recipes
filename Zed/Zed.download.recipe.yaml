Description: |
  Downloads the selected architecture build of Zed from the project's GitHub releases.

  Zed publishes separate per-architecture DMGs (Zed-aarch64.dmg and Zed-x86_64.dmg)
  rather than a universal binary. DOWNLOAD_TYPE selects which upstream asset to fetch
  (aarch64 or x86_64; default aarch64); ARCHITECTURE is the normalised label used for
  the package name downstream (arm64 or x86_64). The app version is read from the
  mounted app rather than the release tag.

  Run as part of the full download -> pkg -> upload chain. URLDownloaderPython caches
  by ETag/Last-Modified and the StopProcessingIf download_changed predicate
  short-circuits the chain on no-op re-runs.
Identifier: com.github.smithjw.download.Zed
MinimumVersion: '2.9'

Input:
  NAME: Zed
  SOFTWARE_TITLE: Zed
  ARCHITECTURE: 'arm64'
  DOWNLOAD_TYPE: 'aarch64'
  INCLUDE_PRERELEASES: null
  DOWNLOAD_MISSING_FILE: null
  BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED: 'False'

Process:
  - Processor: GitHubReleasesInfoProvider
    Arguments:
      asset_regex: '^Zed-%DOWNLOAD_TYPE%\.dmg$'
      github_repo: zed-industries/zed
      include_prereleases: '%INCLUDE_PRERELEASES%'

  - Processor: URLDownloaderPython
    Arguments:
      download_missing_file: '%DOWNLOAD_MISSING_FILE%'

  - Processor: EndOfCheckPhase

  - Processor: StopProcessingIf
    Arguments:
      predicate: 'download_changed == False AND %BYPASS_STOP_PROCESSING_IF_DOWNLOAD_UNCHANGED% == False'

  - Processor: AppDmgVersioner
    Arguments:
      dmg_path: '%pathname%'

  - Processor: CodeSignatureVerifier
    Arguments:
      input_path: '%pathname%/Zed.app'
      requirement: identifier "dev.zed.Zed" and anchor apple generic and certificate 1[field.1.2.840.113635.100.6.2.6] /* exists */ and certificate leaf[field.1.2.840.113635.100.6.1.13] /* exists */ and certificate leaf[subject.OU] = "MQ55VZLNZQ"

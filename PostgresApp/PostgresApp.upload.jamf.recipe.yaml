Description: |
  Downloads the selected PostgreSQL build of Postgres.app, packages it, and uploads
  to Jamf Pro. Old packages matching PKG_NAME_MATCH are pruned to keep the most
  recent PKG_TO_KEEP versions.

  PKG_NAME_MATCH includes the PostgreSQL major version so the cleaner only rotates
  packages within the same line (e.g. PostgresApp-18-) and never deletes the 14/15/
  16/17 lines.

  This recipe stops at "upload + cleanup". Downstream override repos own their own
  policy / scope. Run as part of the full download -> pkg -> upload chain so
  URLDownloaderPython's HTTP cache can short-circuit unchanged builds.
Identifier: com.github.smithjw.jamf.upload.PostgresApp
ParentRecipe: com.github.smithjw.pkg.PostgresApp
MinimumVersion: '2.9'

Input:
  NAME: Postgres.app
  SOFTWARE_TITLE: PostgresApp
  POSTGRES_VERSION: '18'
  CATEGORY: Apps
  REMOVE_OLD_PACKAGES: 'true'
  PACKAGE_INFO: autopkg
  PKG_TO_KEEP: '2'
  PKG_NAME_MATCH: '%SOFTWARE_TITLE%-%POSTGRES_VERSION%-'

Process:
  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPackageUploader
    Arguments:
      pkg_category: '%CATEGORY%'
      pkg_info: '%PACKAGE_INFO%'

  - Processor: com.github.grahampugh.recipes.postprocessors/LastRecipeRunResult

  - Processor: StopProcessingIf
    Arguments:
      predicate: '%REMOVE_OLD_PACKAGES% == false'

  - Processor: com.github.grahampugh.jamf-upload.processors/JamfPackageCleaner
    Arguments:
      pkg_name_match: '%PKG_NAME_MATCH%'
      versions_to_keep: '%PKG_TO_KEEP%'
